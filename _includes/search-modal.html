{% if site.search %}
<div class="search-modal" id="search-modal" role="dialog" aria-modal="true" aria-label="Pencarian" aria-hidden="true">
  <div class="search-modal__backdrop" id="search-backdrop"></div>
  <div class="search-modal__panel">
    <div class="search-modal__header">
      <div class="search-modal__input-wrap">
        <svg class="search-modal__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/>
          <path d="m21 21-4.35-4.35"/>
        </svg>
        <input
          type="search"
          class="search-modal__input"
          id="search-input"
          placeholder="Cari artikel, halaman..."
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          aria-label="Cari konten"
        >
        <button class="search-modal__clear" id="search-clear" aria-label="Hapus pencarian" hidden>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <button class="search-modal__close" id="search-close" aria-label="Tutup pencarian">Batal</button>
    </div>

    <div class="search-modal__body">
      <div class="search-modal__results" id="search-results" role="listbox" aria-label="Hasil pencarian">
        <!-- Populated by JS -->
      </div>
      <div class="search-modal__empty" id="search-empty" hidden>
        <div class="search-modal__empty-icon" aria-hidden="true">⌕</div>
        <p class="search-modal__empty-text">Tidak ada hasil untuk "<span id="search-empty-query"></span>"</p>
        <p class="search-modal__empty-hint">Coba kata kunci yang berbeda</p>
      </div>
      <div class="search-modal__initial" id="search-initial">
        <p class="search-modal__hint">Ketik untuk mulai mencari…</p>
        <div class="search-modal__shortcuts">
          <span class="search-shortcut"><kbd>↑</kbd><kbd>↓</kbd> Navigasi</span>
          <span class="search-shortcut"><kbd>↵</kbd> Buka</span>
          <span class="search-shortcut"><kbd>Esc</kbd> Tutup</span>
        </div>
      </div>
    </div>
  </div>
</div>
{% endif %}
