<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>

  {% seo %}

  <!-- Prevent theme flash: apply saved theme before render -->
  <script>
    (function(){
      var t = localStorage.getItem('site-theme');
      var d = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t || d);
    })();
  </script>

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

  {% include navbar.html %}

  <main id="main-content">
    {{ content }}
  </main>

  {% include footer.html %}

  {% include search-modal.html %}

  <script src="{{ '/assets/js/theme.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/navbar.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/search.js' | relative_url }}"></script>

  {% if site.search %}
  <script>
    window.searchIndex = [
      {% assign searchable = "" | split: "" %}
      {% for post in site.posts %}{% unless post.search_exclude %}{% assign searchable = searchable | push: post %}{% endunless %}{% endfor %}
      {% for p in site.pages %}{% unless p.search_exclude %}{% assign searchable = searchable | push: p %}{% endunless %}{% endfor %}
      {% for item in searchable %}
      {% unless forloop.first %},{% endunless %}
      {
        "title": {{ item.title | jsonify }},
        "url": {{ item.url | relative_url | jsonify }},
        "date": {{ item.date | date: "%d %B %Y" | jsonify }},
        "excerpt": {{ item.excerpt | strip_html | truncatewords: 40 | jsonify }},
        "content": {{ item.content | strip_html | truncatewords: 80 | jsonify }},
        "categories": {{ item.categories | join: ", " | jsonify }}
      }
      {% endfor %}
    ];
  </script>
  {% endif %}

</body>
</html>
