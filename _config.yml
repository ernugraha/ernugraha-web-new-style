title: "MySite"
description: "Sambut generasi terbaru."
url: ""
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# Search settings
search: true

# Plugins — only GitHub Pages supported ones
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Collections
collections:
  pages:
    output: true
    permalink: /:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      search_exclude: false
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
      search_exclude: false

# Exclude
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .git
  - README.md
